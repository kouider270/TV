<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBN STREAM TV - Auto Filter</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --primary: #00d2ff; --bg: #050a14; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; overflow: hidden; height: 100vh; }
        
        #splash { position: fixed; inset: 0; background: #050a14; z-index: 10000; display: flex; align-items: center; justify-content: center; transition: 0.8s; }
        .hidden { opacity: 0; visibility: hidden; }

        #ui-wrapper { 
            position: fixed; inset: 0; z-index: 100; display: flex; flex-direction: column; 
            background: linear-gradient(to left, rgba(5, 10, 20, 0.98) 480px, transparent); 
            transition: 0.4s ease-out; 
        }
        #ui-wrapper.ui-hidden { transform: translateX(100%); opacity: 0; pointer-events: none; }

        header { background: rgba(20, 20, 20, 0.95); padding: 15px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; border-bottom: 2px solid var(--primary); }

        .focusable {
            padding: 12px 18px; border-radius: 10px; background: rgba(255,255,255,0.1);
            outline: none; border: 2px solid transparent; transition: 0.2s;
            cursor: pointer; font-weight: bold; font-size: 14px; white-space: nowrap;
        }

        .focusable.focused {
            background: var(--primary) !important; color: #000 !important;
            border-color: #fff; transform: scale(1.1); box-shadow: 0 0 30px var(--primary);
        }

        .main-container { display: flex; flex: 1; overflow: hidden; justify-content: flex-end; }
        #channels { width: 450px; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); overflow-y: auto; padding: 20px; }
        
        .channel { padding: 16px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; font-size: 18px; border-radius: 10px; border-right: 4px solid transparent; }
        .channel.playing { background: rgba(0, 210, 255, 0.15); border-right-color: var(--primary); }

        #player-container { position: fixed; inset: 0; z-index: 1; background: #000; }
        video { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>

<div id="splash">
    <img src="logo.png" style="width:300px" onerror="this.style.display='none'">
    <h1 style="color: var(--primary)">KBN STREAM TV</h1>
</div>

<div id="player-container">
    <video id="video" autoplay></video>
</div>

<div id="ui-wrapper">
    <header id="nav-bar">
        <div class="focusable nav-item" onclick="filterByCategory('عربية')">🌍 عربية</div>
        <div class="focusable nav-item" onclick="filterByCategory('اخبار')">📰 أخبار</div>
        <div class="focusable nav-item" onclick="filterByCategory('رياضة')">⚽ رياضة</div>
        <div class="focusable nav-item" onclick="filterByCategory('وثائقي')">📜 وثائقي</div>
        <div class="focusable nav-item" onclick="filterByCategory('إسلامية')">🕌 إسلامية</div>
        <div class="focusable nav-item" onclick="filterByCategory('اطفال')">👶 أطفال</div>
        <div class="focusable nav-item" onclick="filterByCategory('Foreign')">🌐 أجنبية</div>
    </header>
    <div class="main-container">
        <div id="channels"></div>
    </div>
</div>

<script>
// القائمة التي أرفقتها كمرجع للفلترة 
const mySelection = {
    "عربية": ["2MMonde", "ChadaTV.ma", "Medi1TVArabic.ma", "Medi1TVMaghreb.ma", "AlArabiyaBusiness", "MoviesAction", "TV2.dz", "CNA.dz", "AmouYazidTV.dz", "JawharaTV.tn", "AlMaghribia.ma", "AlSouriyaTV.sy", "AlmagdTVMiddleEast.us", "AlQanat9.tr", "AmmanTV.jo", "BahrainTV.bh", "DW.de@Arabic", "ElsharqTV.tr", "FalastiniTV.ps", "HalaRamallah.ps", "JordanTV.jo", "MBC1.ae", "MBC1Egypt", "MBC4.ae", "MBC5.ae", "MBCDrama.ae", "MBCMasr2.eg", "MixHollywood.eg", "MoviesAction.sa", "OneTV.lb"],
    "وثائقي": ["AlJazeeraDocumentary.qa", "AsharqDiscovery.sa", "AsharqDocumentary.sa", "OmanTVCultural.om"],
    "اخبار": ["France24.fr@Arabic", "BBCArabic.uk", "Alarabiya.ae", "RTArabic.ru", "AlArabiyaBusiness.ae", "AlArabiyaPrograms.ae", "AlHadath.sa", "AlIraqiaNews.iq", "AlJadeed.lb", "AlJazeera.qa", "AlJazeeraMubasher.qa", "AsharqNews.sa", "SkyNewsArabia.ae", "TRTArabi.tr"],
    "رياضة": ["AlkassOne.qa", "AlkassThree.qa", "AlkassFive.qa", "AlkassFour.qa", "AlkassSix.qa", "AlkassSeven.qa", "AlkassSHOOF.qa", "AlkassTwo.qa", "JordanSport.jo", "KTVSportPlus.kw"],
    "إسلامية": ["HolyQuranRadioNablus.ps", "AlMadina.ps", "AlQuranAlKareemTV", "AlResalah.sa", "AlistiqamaTV.om", "Alquran.iq", "BahrainQuran.bh", "KaifaTV.jo", "MakkahTV.sa", "QuranRadio.sa"],
    "اطفال": ["MBC3USA.us", "RoyaKids.jo", "RoyaKidsOriginals.jo", "SpacetoonArabic.ae", "TahaTV.lb"]
};

let allChannels = []; 
let hlsInstance = null;
let isUiVisible = true;
let focusElements = [];
let focusIndex = 0;
let currentUrl = "";
let hideTimeout;

const SOURCE_URL = "https://iptv-org.github.io/iptv/index.m3u";

window.onload = () => {
    fetch(SOURCE_URL).then(r => r.text()).then(t => {
        allChannels = parseM3U(t);
        filterByCategory('عربية');
    });
    setTimeout(() => document.getElementById('splash').classList.add('hidden'), 3000);
};

function parseM3U(text) {
    const lines = text.split('\n');
    let res = [];
    for (let i = 0; i < lines.length; i++) {
        if (lines[i].includes('#EXTINF')) {
            const info = lines[i];
            const name = info.split(',')[1] || "";
            const url = lines[i+1]?.trim();
            if (url && url.startsWith('http')) {
                res.push({ name: name.trim(), url, raw: info });
            }
        }
    }
    return res;
}

function filterByCategory(cat) {
    const container = document.getElementById('channels');
    container.innerHTML = '';

    let filtered = [];
    if (cat === 'Foreign') {
        // فلترة الأجنبية: أي قناة لا تحتوي على حروف عربية ولا تنتمي لقائمتك
        filtered = allChannels.filter(ch => !/[\u0600-\u06FF]/.test(ch.name) && !ch.name.toLowerCase().includes('ara'));
    } else {
        // الفلترة التلقائية بناءً على الأسماء في ملف canal.txt 
        const targetNames = mySelection[cat];
        filtered = allChannels.filter(ch => {
            return targetNames.some(target => ch.raw.includes(target) || ch.url.includes(target));
        });
    }

    filtered.forEach(ch => {
        const div = document.createElement('div');
        div.className = 'focusable channel' + (ch.url === currentUrl ? ' playing' : '');
        div.innerHTML = `▶ ${ch.name}`;
        div.onclick = () => playChannel(ch.url);
        container.appendChild(div);
    });

    refreshFocus();
    focusIndex = 7; // القفز للقنوات
    updateFocus();
}

function playChannel(url) {
    currentUrl = url;
    if (hlsInstance) hlsInstance.destroy();
    const video = document.getElementById('video');
    if (Hls.isSupported()) {
        hlsInstance = new Hls();
        hlsInstance.loadSource(url);
        hlsInstance.attachMedia(video);
        hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
            video.play();
            toggleUI(false);
        });
    }
}

function toggleUI(show) {
    isUiVisible = show;
    document.getElementById('ui-wrapper').className = show ? '' : 'ui-hidden';
    if (show) {
        clearTimeout(hideTimeout);
        refreshFocus();
        const playing = document.querySelector('.channel.playing');
        if (playing) focusIndex = focusElements.indexOf(playing);
        updateFocus();
        hideTimeout = setTimeout(() => toggleUI(false), 8000);
    }
}

// استيقاظ عند تحريك الفأرة أو ضغط أي زر
document.addEventListener('mousemove', () => { if (!isUiVisible) toggleUI(true); });
document.addEventListener('keydown', (e) => {
    if (!isUiVisible) {
        if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Enter', 'Backspace'].includes(e.key)) {
            toggleUI(true);
            return;
        }
    }
    if (e.key === 'ArrowDown') focusIndex = Math.min(focusIndex + 1, focusElements.length - 1);
    else if (e.key === 'ArrowUp') focusIndex = Math.max(focusIndex - 1, 0);
    else if (e.key === 'ArrowLeft') { if (focusIndex >= 7) focusIndex = 0; }
    else if (e.key === 'ArrowRight') { if (focusIndex < 7) focusIndex = 7; }
    else if (e.key === 'Enter') focusElements[focusIndex].click();
    else if (e.key === 'Escape' || e.key === 'Backspace') toggleUI(false);
    updateFocus();
});

function refreshFocus() { focusElements = Array.from(document.querySelectorAll('.focusable')); }
function updateFocus() {
    focusElements.forEach((el, idx) => {
        el.classList.toggle('focused', idx === focusIndex);
        if (idx === focusIndex) el.scrollIntoView({ block: 'center', behavior: 'smooth' });
    });
}
</script>
</body>
</html>
