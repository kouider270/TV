<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBN STREAM TV PRO - Multi-Language Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --primary: #00d2ff; --bg: #050a14; --card: rgba(255, 255, 255, 0.05); }
        body { margin: 0; font-family: sans-serif; background: #000; color: #fff; overflow: hidden; height: 100vh; }
        
        /* شاشة الترحيب مع الشعار المكبر */
        #splash { 
            position: fixed; inset: 0; 
            background: radial-gradient(circle, #101a30 0%, #050a14 100%); 
            z-index: 10000; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            transition: opacity 1s ease-in-out, visibility 1s; 
        }
        
        .loader-logo { 
            width: 450px; /* شعار مكبر بناءً على طلبك */
            max-width: 85%;
            height: auto;
            filter: drop-shadow(0 0 30px rgba(0, 210, 255, 0.8)); 
            animation: pulse 2.5s infinite ease-in-out; 
        }
        
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.9; } 50% { transform: scale(1.05); opacity: 1; } }
        .hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        /* واجهة التحكم */
        #ui-wrapper {
            position: fixed; inset: 0; z-index: 100; display: flex; flex-direction: column;
            background: linear-gradient(to left, rgba(5, 10, 20, 0.98) 420px, transparent);
            transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #ui-wrapper.ui-hidden { transform: translateX(100%); opacity: 0; pointer-events: none; }

        header { background: rgba(20, 20, 20, 0.85); padding: 20px; display: flex; gap: 15px; justify-content: flex-end; padding-right: 50px; }
        .nav-item { padding: 12px 25px; border-radius: 30px; cursor: pointer; background: var(--card); outline: none; border: 2px solid transparent; transition: 0.3s; font-weight: bold; font-size: 16px; }
        
        .nav-item:focus, .channel:focus { background: var(--primary) !important; color: #000 !important; border-color: #fff; transform: scale(1.08); box-shadow: 0 0 25px var(--primary); }
        .active-nav { border-bottom: 4px solid var(--primary); }

        .main-container { display: flex; flex: 1; overflow: hidden; justify-content: flex-end; }
        #channels { width: 400px; background: rgba(10, 10, 10, 0.6); overflow-y: auto; padding: 20px; }
        .channel { padding: 18px; margin-bottom: 10px; background: var(--card); border-radius: 12px; cursor: pointer; outline: none; display: flex; align-items: center; gap: 15px; font-size: 18px; text-align: right; }
        
        #player-container { position: fixed; inset: 0; z-index: 1; background: #000; }
        video { width: 100%; height: 100%; object-fit: contain; }
        
        .status-msg { position: absolute; bottom: 50px; right: 50px; color: var(--primary); font-weight: bold; z-index: 2; background: rgba(0,0,0,0.7); padding: 15px 25px; border-radius: 12px; display: none; }
    </style>
</head>
<body>

<div id="splash">
    <img src="logo.png" alt="KBN Logo" class="loader-logo" onerror="this.src='https://via.placeholder.com/450x250?text=KBN+STREAM'">
    <h1 style="color: var(--primary); margin-top: 20px;">KBN STREAM TV</h1>
</div>

<div id="player-container">
    <div id="vid-loading" class="status-msg">جاري تحميل البث...</div>
    <video id="video" autoplay></video>
</div>

<div id="ui-wrapper">
    <header>
        <div class="nav-item" tabindex="0" id="btn-ara" onclick="fetchM3U('https://iptv-org.github.io/iptv/languages/ara.m3u', this)">🌍 قنوات عربية</div>
        <div class="nav-item" tabindex="0" id="btn-sports" onclick="fetchM3U('https://iptv-org.github.io/iptv/categories/sports.m3u', this)">⚽ قنوات رياضية</div>
        <div class="nav-item" tabindex="0" id="btn-fr" onclick="fetchM3U('https://iptv-org.github.io/iptv/countries/fr.m3u', this)">🇫🇷 قنوات فرنسية</div>
    </header>

    <div class="main-container">
        <div id="channels">
            <div style="text-align:center; padding:60px; color:#aaa;">اختر باقة لعرض القنوات</div>
        </div>
    </div>
</div>

<script>
let hlsInstance = null;
let isUiVisible = true;

window.onload = () => {
    setTimeout(() => {
        document.getElementById('splash').classList.add('hidden');
        document.getElementById('btn-ara').focus();
    }, 3500);
};

async function fetchM3U(url, element) {
    const container = document.getElementById('channels');
    container.innerHTML = '<div style="text-align:center; padding:30px; color:var(--primary);">جاري التحميل...</div>';
    
    document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active-nav'));
    element.classList.add('active-nav');

    try {
        const response = await fetch(url);
        const text = await response.text();
        const channels = parseM3U(text);
        renderChannels(channels);
        
        setTimeout(() => {
            if(container.firstChild) container.firstChild.focus();
        }, 150);

    } catch (err) {
        container.innerHTML = `<div style="text-align:center; padding:30px; color:#ff4444;">❌ فشل تحميل القائمة</div>`;
    }
}

function parseM3U(content) {
    let lines = content.split('\n');
    let result = [];
    for (let i = 0; i < lines.length; i++) {
        if (lines[i].includes('#EXTINF')) {
            let name = lines[i].split(',')[1] || "قناة";
            let url = lines[i+1]?.trim();
            if (url && url.startsWith('http')) result.push({name: name.trim(), url: url});
        }
    }
    return result;
}

function renderChannels(list) {
    const container = document.getElementById('channels');
    container.innerHTML = '';
    list.slice(0, 400).forEach((ch) => {
        let div = document.createElement('div');
        div.className = 'channel';
        div.setAttribute('tabindex', '0');
        div.innerHTML = `<span>▶</span> ${ch.name}`;
        
        const selectChannel = () => playChannel(ch.url);
        div.onclick = selectChannel;
        div.onkeydown = (e) => { if(e.key === 'Enter') selectChannel(); };
        
        container.appendChild(div);
    });
}

function playChannel(url) {
    const video = document.getElementById('video');
    const loading = document.getElementById('vid-loading');
    loading.style.display = 'block';

    if (hlsInstance) hlsInstance.destroy();

    if (Hls.isSupported()) {
        hlsInstance = new Hls();
        hlsInstance.loadSource(url);
        hlsInstance.attachMedia(video);
        hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
            video.play();
            loading.style.display = 'none';
            toggleUI(false); 
        });
        hlsInstance.on(Hls.Events.ERROR, () => { loading.innerText = "❌ خطأ في البث"; });
    } else {
        video.src = url;
        toggleUI(false);
    }
}

function toggleUI(show) {
    const ui = document.getElementById('ui-wrapper');
    if (show) {
        ui.classList.remove('ui-hidden');
        isUiVisible = true;
        document.querySelector('.active-nav').focus();
    } else {
        ui.classList.add('ui-hidden');
        isUiVisible = false;
        document.activeElement.blur(); 
    }
}

document.addEventListener('keydown', function(e) {
    if (!isUiVisible) {
        if (e.key === 'Enter' || e.key === 'ArrowUp' || e.key === 'ArrowDown') {
            toggleUI(true);
        }
        return;
    }

    const active = document.activeElement;
    
    switch(e.key) {
        case 'ArrowDown':
            const next = active.nextElementSibling;
            if (next && next.classList.contains('channel')) next.focus();
            break;
        case 'ArrowUp':
            const prev = active.previousElementSibling;
            if (prev) prev.focus();
            else if (active.classList.contains('channel')) {
                document.querySelector('.active-nav').focus();
            }
            break;
        case 'ArrowRight':
        case 'ArrowLeft':
            if(active.classList.contains('nav-item')) {
                const navs = document.querySelectorAll('.nav-item');
                if (e.key === 'ArrowRight') {
                    if (active === navs[0]) navs[1].focus();
                    else if (active === navs[1]) navs[2].focus();
                } else {
                    if (active === navs[2]) navs[1].focus();
                    else if (active === navs[1]) navs[0].focus();
                }
            }
            break;
        case 'Escape':
        case 'Backspace':
            toggleUI(false);
            break;
    }
});
</script>
</body>
</html>
