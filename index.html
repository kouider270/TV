<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBN STREAM TV - Key Navigation</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --primary: #00d2ff; --bg: #050a14; --card: rgba(255, 255, 255, 0.1); }
        body { margin: 0; font-family: sans-serif; background: #000; color: #fff; overflow: hidden; height: 100vh; }
        
        /* شاشة الترحيب */
        #splash { position: fixed; inset: 0; background: #050a14; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.8s; }
        .loader-logo { width: 450px; filter: drop-shadow(0 0 30px var(--primary)); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        /* الواجهة */
        #ui-wrapper {
            position: fixed; inset: 0; z-index: 100; display: flex; flex-direction: column;
            background: linear-gradient(to left, rgba(5, 10, 20, 0.95) 450px, transparent);
            transition: 0.5s ease;
        }
        #ui-wrapper.ui-hidden { transform: translateX(100%); opacity: 0; }

        header { background: rgba(20, 20, 20, 0.9); padding: 25px; display: flex; gap: 20px; justify-content: center; }
        
        /* أهم جزء: شكل العنصر عندما يكون عليه الـ Focus */
        .focusable {
            padding: 15px 30px; border-radius: 15px; background: var(--card);
            outline: none; border: 3px solid transparent; transition: 0.2s;
            cursor: pointer; font-weight: bold;
        }
        /* تأثير التلفاز الحقيقي */
        .focusable.focused {
            background: var(--primary) !important;
            color: #000 !important;
            border-color: #fff;
            transform: scale(1.1);
            box-shadow: 0 0 30px var(--primary);
        }

        .main-container { display: flex; flex: 1; overflow: hidden; justify-content: flex-end; }
        #channels { width: 400px; background: rgba(10, 10, 10, 0.7); overflow-y: auto; padding: 20px; }
        
        .channel { padding: 18px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; font-size: 18px; text-align: right; }

        #player-container { position: fixed; inset: 0; z-index: 1; background: #000; }
        video { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>

<div id="splash">
    <img src="logo.png" class="loader-logo">
    <h1 style="color: var(--primary)">KBN STREAM TV</h1>
</div>

<div id="player-container">
    <video id="video" autoplay></video>
</div>

<div id="ui-wrapper">
    <header id="nav-bar">
        <div class="focusable nav-item" data-url="https://iptv-org.github.io/iptv/languages/ara.m3u">🌍 عربية</div>
        <div class="focusable nav-item" data-url="https://iptv-org.github.io/iptv/categories/sports.m3u">⚽ رياضة</div>
        <div class="focusable nav-item" data-url="https://iptv-org.github.io/iptv/countries/fr.m3u">🇫🇷 فرنسية</div>
    </header>

    <div class="main-container">
        <div id="channels">
            <p style="text-align:center;color:#666">استخدم الأسهم و Enter</p>
        </div>
    </div>
</div>

<script>
let hlsInstance = null;
let isUiVisible = true;
let focusIndex = 0; // مؤشر العنصر المختار حالياً

// إخفاء الترحيب
setTimeout(() => {
    document.getElementById('splash').classList.add('hidden');
    updateFocus();
}, 3000);

// محرك التحكم بلوحة المفاتيح (الأسهم + Enter)
document.addEventListener('keydown', (e) => {
    if (!isUiVisible) {
        if (e.key === 'Enter' || e.key === 'ArrowUp' || e.key === 'ArrowDown') toggleUI(true);
        return;
    }

    const items = document.querySelectorAll('.focusable');
    
    if (e.key === 'ArrowDown' || e.key === 'ArrowLeft') {
        if (focusIndex < items.length - 1) focusIndex++;
    } else if (e.key === 'ArrowUp' || e.key === 'ArrowRight') {
        if (focusIndex > 0) focusIndex--;
    } else if (e.key === 'Enter') {
        items[focusIndex].click(); // تنفيذ النقر عند ضغط Enter
    } else if (e.key === 'Escape' || e.key === 'Backspace') {
        toggleUI(false);
    }
    
    updateFocus();
});

// تحديث الشكل البصري للتركيز
function updateFocus() {
    const items = document.querySelectorAll('.focusable');
    items.forEach((item, index) => {
        if (index === focusIndex) {
            item.classList.add('focused');
            item.scrollIntoView({ block: 'center', behavior: 'smooth' });
        } else {
            item.classList.remove('focused');
        }
    });
}

// وظيفة جلب القنوات
async function loadBaqqa(url) {
    const container = document.getElementById('channels');
    container.innerHTML = '<p style="text-align:center">جاري التحميل...</p>';
    
    try {
        const res = await fetch(url);
        const text = await res.text();
        const lines = text.split('\n');
        container.innerHTML = '';

        lines.forEach((line, i) => {
            if (line.includes('#EXTINF')) {
                const name = line.split(',')[1] || "قناة";
                const streamUrl = lines[i+1]?.trim();
                
                if (streamUrl && streamUrl.startsWith('http')) {
                    const div = document.createElement('div');
                    div.className = 'focusable channel';
                    div.innerText = "▶ " + name;
                    div.onclick = () => playChannel(streamUrl);
                    container.appendChild(div);
                }
            }
        });
        // بعد تحميل القنوات، نجعل التركيز ينتقل لأول قناة
        focusIndex = 3; // تخطي أزرار الهيدر الثلاثة
        updateFocus();
    } catch (e) {
        container.innerHTML = '❌ فشل التحميل';
    }
}

// ربط أزرار الهيدر بالوظيفة
document.querySelectorAll('.nav-item').forEach(btn => {
    btn.onclick = () => loadBaqqa(btn.dataset.url);
});

function playChannel(url) {
    const video = document.getElementById('video');
    if (hlsInstance) hlsInstance.destroy();
    if (Hls.isSupported()) {
        hlsInstance = new Hls();
        hlsInstance.loadSource(url);
        hlsInstance.attachMedia(video);
        hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
            video.play();
            toggleUI(false); // إخفاء القائمة عند التشغيل
        });
    }
}

function toggleUI(show) {
    isUiVisible = show;
    document.getElementById('ui-wrapper').className = show ? '' : 'ui-hidden';
}
</script>

</body>
</html>
